<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>salisa</title>
    <!-- Favicon รูปเค้ก -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎂</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <video autoplay muted loop playsinline id="bg-video">
        <source src="assets/videos/aurora.mp4" type="video/mp4">
        เบราว์เซอร์ของคุณไม่รองรับการเล่นวิดีโอ
    </video>
    
    <div class="bg-particles"></div>
    
    <!-- แสงออโรร่าด้านบน -->
    <div class="aurora-top"></div>

    <!-- ดวงดาวกระพริบตามมุม -->
    <div class="stars-layer"></div>

    <!-- ฟองสบู่พาสเทลลอยตัว -->
    <div class="bubbles-layer">
        <div class="bubble" style="left: 10%; width: 40px; height: 40px; animation-delay: 0s; animation-duration: 12s;"></div>
        <div class="bubble" style="left: 25%; width: 25px; height: 25px; animation-delay: 4s; animation-duration: 15s;"></div>
        <div class="bubble" style="left: 75%; width: 50px; height: 50px; animation-delay: 2s; animation-duration: 18s;"></div>
        <div class="bubble" style="left: 90%; width: 30px; height: 30px; animation-delay: 7s; animation-duration: 14s;"></div>
        <div class="bubble" style="left: 50%; width: 20px; height: 20px; animation-delay: 10s; animation-duration: 10s;"></div>
    </div>

    <div class="layout-wrapper" id="layout-wrapper">
        <div class="card-container">
            
            <!-- Page 1: Welcome -->
            <div class="card-page active" id="page-welcome">
                <div style="font-size: 4rem; margin-bottom: 10px; animation: bounce 2s infinite;">🎂</div>
                <h1>Happy Birthday</h1>
                <p>มีความสุขมากๆ ในทุกๆวันน้า :)</p>
                <button class="btn-style" onclick="goToPage('page-gallery')">เปิดกล่องของขวัญ</button>
                <style>
                    @keyframes bounce {
                        0%, 100% { transform: translateY(0); }
                        50% { transform: translateY(-10px); }
                    }
                </style>
            </div>

            <!-- Page 2: Gallery -->
            <div class="card-page" id="page-gallery">
                <!-- วิดีโอพื้นหลังแบบจางๆ -->
                <video autoplay muted loop playsinline class="page-bg-video">
                    <source src="assets/videos/congrat.mov" type="video/mp4">
                </video>
                
                <h2>Wishing you all the best :)</h2>
                <div class="photo-frame">
                    <img src="assets/images/salisa.png" alt="salisaa">
                </div>
                <p class="small">ming bd</p>
                <button class="btn-style" onclick="goToPage('page-wishes')">อ่านคำอวยพร</button>
            </div>

            <!-- Page 3: Wishes -->
            <div class="card-page" id="page-wishes">
                <!-- วิดีโอพื้นหลังแบบจางๆ -->
                <video autoplay muted loop playsinline class="page-bg-video">
                    <source src="assets/videos/congrat.mov" type="video/mp4">
                </video>
                
                <h2> </h2>
                <div class="wish-text" id="typewriter-text">
                    <!-- Text will be typed here -->
                </div>
                <button class="btn-style" onclick="goToCards()">🎉สุ่มการ์ดครับๆ:) </button>
            </div>

            <!-- Page 4: Choose a Card -->
            <div class="card-page" id="page-cards">
                <h2>สุ่มการ์ด 1 ใบ 🔮</h2>
                <p class="small">ลองเลือกมาซักใบดูสิ==)</p>
                
                <div class="tarot-container">
                    <div class="tarot-card" onclick="flipCard(this, 1)">
                        <div class="tarot-inner">
                            <div class="tarot-front">?</div>
                            <div class="tarot-back">✨
                                <div id="msg-data-1" style="display: none;">
                                    A bouquet of three gerberas<br><br>
                                    <div style="text-align: center; margin-top: 20px;">
                                        <img src="assets/images/Gerberas.jpg" alt="Gerberas Bouquet" style="width: 100%; max-width: 300px; border-radius: 16px; margin-top: 10px; box-shadow: 0 8px 20px rgba(0,0,0,0.4);">
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="tarot-card" onclick="flipCard(this, 2)">
                        <div class="tarot-inner">
                            <div class="tarot-front">?</div>
                            <div class="tarot-back">✨
                                <div id="msg-data-2" style="display: none;">
                                    <div class="clover-wrapper">
                                        <div class="clover-container">
                                            <div class="leaf leaf-1"></div>
                                            <div class="leaf leaf-2"></div>
                                            <div class="leaf leaf-3"></div>
                                            <div class="leaf leaf-4"></div>
                                            <div class="clover-stem"></div>
                                        </div>
                                        <p class="clover-text">ขอให้โชคดีในทุกๆ ก้าวเดินนะมิ้ง</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="tarot-card" onclick="flipCard(this, 3)">
                        <div class="tarot-inner">
                            <div class="tarot-front">?</div>
                            <div class="tarot-back">✨
                                <div id="msg-data-3" style="display: none;">
                                    แมวมิ้งมาอวยพร<br><br>
                                    <video autoplay muted loop playsinline style="width: 100%; border-radius: 12px; margin-top: 10px;">
                                        <source src="assets/videos/cat.mov">
                                    </video>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- เอาปุ่มกลับหน้าแรกไปไว้ในกรอบขวาแทน -->
            </div>

        </div>

        <!-- กล่องข้อความด้านขวา -->
        <div class="message-box" id="message-box">
            <!-- Header แบบดั้งเดิม -->
            <h3 id="msg-header-text">☽</h3>
            
            <!-- Header แบบ QR Code (ซ่อนไว้ก่อน) -->
            <div id="msg-header-qr" style="display: none; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.15); padding-bottom: 1.5rem; margin-bottom: 2rem;">
                <a href="https://www.youtube.com/watch?v=A3g8Gh7GZKY&list=RDA3g8Gh7GZKY&start_radio=1" target="_blank" style="display: inline-block;">
                    <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https%3A%2F%2Fwww.youtube.com%2Fwatch%3Fv%3DA3g8Gh7GZKY%26list%3DRDA3g8Gh7GZKY%26start_radio%3D1" alt="YouTube Playlist QR Code" style="width: 130px; height: 130px; border-radius: 12px; border: 3px solid rgba(255,255,255,0.3); transition: transform 0.3s ease; box-shadow: 0 4px 15px rgba(0,0,0,0.3);" onmouseover="this.style.transform='scale(1.08)'" onmouseout="this.style.transform='scale(1)'">
                </a>
            </div>
            <div class="msg-content" id="msg-content">
                <!-- ข้อความจะถูกนำมาใส่ตรงนี้ -->
            </div>
            <button class="btn-style" onclick="goToPage('page-welcome')" style="margin-top: 1.5rem; width: 100%; padding: 12px; font-size: 1rem;">กลับหน้าแรก 🏠</button>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script src="https://unpkg.com/typewriter-effect@latest/dist/core.js"></script>
    <script src="script.js"></script>
</body>
</html>
